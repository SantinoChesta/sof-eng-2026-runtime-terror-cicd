name: Run Tests
description: Ejecuta todos los tests del proyecto

runs:
  using: composite

  steps:
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Run tests
      shell: bash
      run: mvn -f tps/unit-testing/pom.xml test